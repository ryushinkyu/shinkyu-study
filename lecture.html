<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="stylesheet" href="style.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>講義</title>
</head>

<body>

<div class="container">

  <div class="card" style="margin-bottom:100px;">

    <h1 id="title"></h1>

    <div id="content"></div>

    <button id="nextBtn" onclick="next()">次へ</button>

  </div>

</div>

<!-- 下固定 -->
<div class="fixed-bottom">
  <button onclick="location.href='lectureMenu.html'">科目選択</button>
  <button onclick="location.href='home.html'">ホーム</button>
</div>

<script>

let subject = localStorage.getItem("selectedSubject");
document.getElementById("title").textContent = subject + " 講義";

let step = 0;
let index = 0;

const lectureData = {

"衛生学・公衆衛生学":[
{
title:"市町村保健センター",
content:"地域住民の健康管理を行う施設。乳幼児健診や健康相談を行う。",
point:"市町村 → <span class='red'>乳幼児健診</span>"
},
{
title:"保健所",
content:"地域保健法に基づく機関。感染症対策や食品衛生を行う。",
point:"保健所 → <span class='red'>感染症・食品衛生</span>"
}
],

"解剖学":[],
"生理学":[],
"病理学概論":[],
"臨床医学総論":[],
"臨床医学各論":[],
"リハビリテーション医学":[],
"東洋医学概論":[],
"経絡経穴概論":[],
"東洋医学臨床論":[]

};

let data = lectureData[subject] || [];

show();

// ===== 表示 =====
function show(){

document.getElementById("nextBtn").style.display = "block";

// ===== 目次 =====
if(step === 0){

document.getElementById("nextBtn").style.display = "none";

let html = "<h3>目次（選択してください）</h3>";

data.forEach((d,i)=>{

let count = localStorage.getItem("lecture_"+subject+"_"+i) || 0;
let checked = count > 0 ? "✔" : "□";

html += `
<div class="card selectable" onclick="selectLecture(${i})">
${checked} ${i+1}. ${d.title}（${count}回）
</div>
`;
});

document.getElementById("content").innerHTML = html;
return;
}

// ===== 内容 =====
if(step === 1){

let d = data[index];

document.getElementById("content").innerHTML = `
<div class="card">
<h3>${d.title}</h3>
<p>${d.content}</p>
</div>
`;

return;
}

// ===== ポイント =====
if(step === 2){

let d = data[index];

document.getElementById("content").innerHTML = `
<div class="point">
<strong>試験ポイント</strong><br>
${d.point}
</div>
`;

return;
}

}

// ===== 次へ =====
function next(){

if(step === 1){
step = 2;
}
else if(step === 2){

let goNext = confirm("目次に戻りますか？");

if(goNext){
step = 0;
show();
return;

}else{

document.getElementById("nextBtn").style.display = "none";

document.getElementById("content").innerHTML = `
<h2>ここまで学習しました！</h2>
<button onclick="location.href='study.html'">学習へ</button>
<button onclick="location.href='quiz.html'">クイズへ</button>
`;

return;
}
}

show();
}

// ===== 選択 =====
function selectLecture(i){

index = i;
step = 1;

// 回数カウント
let key = "lecture_"+subject+"_"+i;
let count = parseInt(localStorage.getItem(key) || "0");
count++;
localStorage.setItem(key, count);

show();
}

</script>

</body>
</html>
