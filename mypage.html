<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マイページ</title>
<link rel="stylesheet" href="style.css">

<!-- Firebase（compat版） -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCP1hLNtyZAsrWg27puxdgOdHz6ZAHt4EM",
  authDomain: "shinkyu-study.firebaseapp.com",
  projectId: "shinkyu-study"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

</head>

<body>

<div class="container">

  <!-- ユーザー情報 -->
  <div class="card">
    <h2>マイページ</h2>
    <div id="userInfo">読み込み中...</div>
  </div>

  <!-- 履歴 -->
  <div id="history"></div>

  <!-- 戻る -->
  <div class="card">
    <button style="background:#777;" onclick="location.href='home.html'">ホーム</button>
  </div>

</div>

<script>

const currentUser = localStorage.getItem("currentUser");

if(!currentUser){
location.href = "loginOrRegister.html";
}

// ===== ユーザー情報 =====
db.collection("users").doc(currentUser).get()
.then(doc => {

if(doc.exists){
const u = doc.data();

document.getElementById("userInfo").innerHTML = `
<p>👤 名前：${u.fullname}</p>
<p>🆔 会員番号：${u.memberId}</p>
<p>📛 ユーザー名：${u.username}</p>
`;
}

});

// ===== 履歴 =====
db.collection("quizResults")
.where("username", "==", currentUser)
.get()
.then(snapshot => {

let html = "";

if(snapshot.empty){
html = "<div class='card'><p>履歴なし</p></div>";
}else{

snapshot.forEach(doc => {
const h = doc.data();
let rate = Math.round((h.score / h.total) * 100);

html += `
<div class="card">
<p>📚 ${h.subject}</p>
<p><strong>🎯 ${h.score}/${h.total}（${rate}%）</strong></p>
<p>🕒 ${h.date}</p>
</div>
`;
});

}

document.getElementById("history").innerHTML = html;

});

</script>

</body>
</html>
