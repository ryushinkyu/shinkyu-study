<!DOCTYPE html>

<html lang="ja">
<head>
<link rel="stylesheet" href="style.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マイページ</title>



</head>

<body>

<div class="card selectable">

<h2>マイページ</h2>

<div id="userInfo" class="info"></div>

<div id="history"></div>

<button onclick="location.href='home.html'">ホーム</button>

</div>

<script>

// ===== ユーザー情報 =====
let currentUser = localStorage.getItem("currentUser");
let users = JSON.parse(localStorage.getItem("users") || "{}");

if(users[currentUser]){
let u = users[currentUser];

document.getElementById("userInfo").innerHTML =
"👤 名前：" + u.fullname + "<br>" +
"🆔 会員番号：" + u.memberId + "<br>" +
"📛 ユーザー名：" + u.username;
}

// ===== 履歴 =====
let history = JSON.parse(localStorage.getItem("quizHistory") || "{}");

let html = "";

if(history[currentUser]){

let grouped = {};

history[currentUser].forEach(h=>{
let subject = h.subject || "不明";
if(!grouped[subject]) grouped[subject] = [];
grouped[subject].push(h);
});

Object.keys(grouped).forEach(subject=>{

html += `<div class="subject"><h3>📚 ${subject}</h3></div>`;

grouped[subject].slice().reverse().forEach(h=>{

let rate = Math.round((h.score / h.total) * 100);

html += `
<div class="card">
<p>🕒 ${h.date}</p>
<p>🎯 ${h.score}/${h.total}（${rate}%）</p>

<div class="detail">
${(h.detail || []).map((d,i)=>`問題${i+1}：${d ? "⭕" : "❌"}`).join("<br>")}
</div>
</div>
`;

});

});

}else{
html = "<p>履歴なし</p>";
}

document.getElementById("history").innerHTML = html;

</script>

</body>
</html>
