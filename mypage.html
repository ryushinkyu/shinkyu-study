<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マイページ</title>

<style>
body{
font-family:Arial;
background:#f0f0f0;
padding:15px;
margin:0;
}

.container{
background:#fff;
padding:15px;
border-radius:12px;
max-width:500px;
margin:auto;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:15px;
}

.info{
background:#e3f2fd;
padding:10px;
border-radius:8px;
margin-bottom:15px;
font-size:14px;
}

.subject{
margin-top:15px;
}

.card{
background:#f9f9f9;
padding:10px;
border-radius:8px;
margin-top:10px;
font-size:14px;
}

.detail{
margin-top:5px;
font-size:13px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#0288d1;
color:white;
font-size:16px;
}

</style>

</head>

<body>

<div class="container">

<h2>マイページ</h2>

<div id="userInfo" class="info"></div>

<div id="history"></div>

<button onclick="location.href='home.html'">ホーム</button>

</div>

<script>

// ===== ユーザー情報 =====
let currentUser = localStorage.getItem("currentUser");
let users = JSON.parse(localStorage.getItem("users") || "{}");

if(users[currentUser]){
let u = users[currentUser];

document.getElementById("userInfo").innerHTML =
"👤 名前：" + u.fullname + "<br>" +
"🆔 会員番号：" + u.memberId + "<br>" +
"📛 ユーザー名：" + u.username;
}

// ===== 履歴 =====
let history = JSON.parse(localStorage.getItem("quizHistory") || "{}");

let html = "";

if(history[currentUser]){

let grouped = {};

history[currentUser].forEach(h=>{
let subject = h.subject || "不明";
if(!grouped[subject]) grouped[subject] = [];
grouped[subject].push(h);
});

Object.keys(grouped).forEach(subject=>{

html += `<div class="subject"><h3>📚 ${subject}</h3></div>`;

grouped[subject].slice().reverse().forEach(h=>{

let rate = Math.round((h.score / h.total) * 100);

html += `
<div class="card">
<p>🕒 ${h.date}</p>
<p>🎯 ${h.score}/${h.total}（${rate}%）</p>

<div class="detail">
${(h.detail || []).map((d,i)=>`問題${i+1}：${d ? "⭕" : "❌"}`).join("<br>")}
</div>
</div>
`;

});

});

}else{
html = "<p>履歴なし</p>";
}

document.getElementById("history").innerHTML = html;

</script>

</body>
</html>
