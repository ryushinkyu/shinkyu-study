<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="stylesheet" href="style.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マイページ</title>
</head>

<body>

<div class="container">

  <!-- ユーザー情報 -->
  <div class="card">
    <h2>マイページ</h2>
    <div id="userInfo"></div>
  </div>

  <!-- 履歴 -->
  <div id="history"></div>

  <!-- 戻る -->
  <div class="card">
    <button style="background:#777;" onclick="location.href='home.html'">ホーム</button>
  </div>

</div>

<script>

// ===== ユーザー情報 =====
let currentUser = localStorage.getItem("currentUser");
let users = JSON.parse(localStorage.getItem("users") || "{}");

if(users[currentUser]){
let u = users[currentUser];

document.getElementById("userInfo").innerHTML = `
<p>👤 名前：${u.fullname}</p>
<p>🆔 会員番号：${u.memberId}</p>
<p>📛 ユーザー名：${u.username}</p>
`;
}

// ===== 履歴 =====
let history = JSON.parse(localStorage.getItem("quizHistory") || "{}");

let html = "";

if(history[currentUser]){

let grouped = {};

history[currentUser].forEach(h=>{
let subject = h.subject || "不明";
if(!grouped[subject]) grouped[subject] = [];
grouped[subject].push(h);
});

Object.keys(grouped).forEach(subject=>{

html += `
<div class="card">
<h3>📚 ${subject}</h3>
</div>
`;

grouped[subject].slice().reverse().forEach(h=>{

let rate = Math.round((h.score / h.total) * 100);

html += `
<div class="card">
<p>🕒 ${h.date}</p>
<p><strong>🎯 ${h.score}/${h.total}（${rate}%）</strong></p>

<div style="margin-top:10px;">
${(h.detail || []).map((d,i)=>`問題${i+1}：${d ? "⭕" : "❌"}`).join("<br>")}
</div>
</div>
`;

});

});

}else{
html = "<div class='card'><p>履歴なし</p></div>";
}

document.getElementById("history").innerHTML = html;

</script>

</body>
</html>
