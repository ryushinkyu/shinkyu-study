<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="stylesheet" href="style.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鍼灸Study - 管理画面</title>
</head>
<body>
<div class="card selectable">
  <h2>管理画面（管理者専用）</h2>
  <div id="userList"></div>
  <button onclick="window.location.href='home.html'">ホームに戻る</button>
</div>

<script>
// 管理者チェック
const adminUser = 'admin';
const currentUser = localStorage.getItem('currentUser');
if(currentUser !== adminUser){
    alert('管理者以外はアクセスできません');
    window.location.href = 'home.html';
}

// ユーザー一覧表示
function renderUsers(){
    const users = JSON.parse(localStorage.getItem('users') || '{}');
    const listDiv = document.getElementById('userList');
    listDiv.innerHTML = '';
    for(const username in users){
        const user = users[username];
        if(username === 'admin') continue; // 管理者は削除不可

        const div = document.createElement('div');
        div.className = 'userItem';
        div.innerHTML = `
            <span>${user.memberId} | ${user.username} | ${user.fullname}</span>
            <button onclick="deleteUser('${username}')">削除</button>
        `;
        listDiv.appendChild(div);
    }
}

// ユーザー削除関数
function deleteUser(username){
    if(confirm(`本当に ${username} を削除しますか？`)){
        const users = JSON.parse(localStorage.getItem('users') || '{}');
        delete users[username];
        localStorage.setItem('users', JSON.stringify(users));
        renderUsers(); // 再描画
    }
}

renderUsers();
</script>
</body>
</html>
