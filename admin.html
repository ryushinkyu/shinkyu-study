<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
<title>管理画面</title>

<!-- Firebase -->
<script <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "ここに貼る",
  authDomain: "ここに貼る",
  projectId: "ここに貼る"
};

firebase-app-compat.js
firebase-firestore-compat.js
</script>

</head>

<body>

<div class="container">
<div class="card">

<h2>管理画面（管理者専用）</h2>

<input type="text" id="search" placeholder="ユーザー検索">

<div id="userList"></div>

<button onclick="location.href='home.html'">ホームに戻る</button>

</div>
</div>

<script>

// ===== 管理者チェック =====
const adminUser = 'admin';
const currentUser = localStorage.getItem('currentUser');

if(currentUser !== adminUser){
alert('管理者以外はアクセスできません');
location.href = 'home.html';
}

// ===== ユーザー一覧 =====
function renderUsers(){

const keyword = document.getElementById("search").value.toLowerCase();
const listDiv = document.getElementById('userList');
listDiv.innerHTML = '';

db.collection("users").get().then(snapshot => {

let users = [];

snapshot.forEach(doc => {
users.push(doc.data());
});

// 並び替え
users.sort((a,b)=> Number(a.memberId) - Number(b.memberId));

// 検索
const keyword = (document.getElementById("search").value || "").toLowerCase();
users.forEach((user,index)=>{

if(keyword){
if(!user.username.toLowerCase().includes(keyword) &&
   !user.fullname.toLowerCase().includes(keyword)){
return;
}
}

// 🏆 ランク
let medal = "";
if(index === 0) medal = "🥇";
else if(index === 1) medal = "🥈";
else if(index === 2) medal = "🥉";

const div = document.createElement('div');
div.className = 'card';

div.innerHTML = `
<p><strong>${index+1}位 ${medal}</strong></p>
<p>${user.memberId} | ${user.username} | ${user.fullname}</p>

<button onclick="deleteUser('${user.username}')">削除</button>
`;

listDiv.appendChild(div);

});

});

}

// ===== 削除（Firebase対応） =====
function deleteUser(username){

if(confirm("削除しますか？")){

db.collection("users").doc(username).delete().then(()=>{
alert("削除しました");
renderUsers();
});

}

}

// ===== 検索連動 =====
document.getElementById("search").addEventListener("input", renderUsers);

// 初期表示
renderUsers();


<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

</script>

</body>
</html>
