<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鍼灸Study - 管理画面</title>
<style>
body { font-family: Arial; background:#f0f0f0; padding:30px; }
.container { background:#fff; padding:20px; border-radius:12px; max-width:700px; margin:auto; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
h2 { text-align:center; margin-bottom:20px; }
.userItem { display:flex; justify-content:space-between; align-items:center; padding:8px; border-bottom:1px solid #ddd; }
button { padding:5px 10px; border:none; border-radius:6px; background:#e53935; color:white; cursor:pointer; }
button:hover { opacity:0.8; }
</style>
</head>
<body>
<div class="container">
  <h2>管理画面（管理者専用）</h2>
  <div id="userList"></div>
  <button onclick="window.location.href='home.html'">ホームに戻る</button>
</div>

<script>
// 管理者チェック
const adminUser = 'admin';
const currentUser = localStorage.getItem('currentUser');
if(currentUser !== adminUser){
    alert('管理者以外はアクセスできません');
    window.location.href = 'home.html';
}

// ユーザー一覧表示
function renderUsers(){
    const users = JSON.parse(localStorage.getItem('users') || '{}');
    const listDiv = document.getElementById('userList');
    listDiv.innerHTML = '';
    for(const username in users){
        const user = users[username];
        if(username === 'admin') continue; // 管理者は削除不可

        const div = document.createElement('div');
        div.className = 'userItem';
        div.innerHTML = `
            <span>${user.memberId} | ${user.username} | ${user.fullname}</span>
            <button onclick="deleteUser('${username}')">削除</button>
        `;
        listDiv.appendChild(div);
    }
}

// ユーザー削除関数
function deleteUser(username){
    if(confirm(`本当に ${username} を削除しますか？`)){
        const users = JSON.parse(localStorage.getItem('users') || '{}');
        delete users[username];
        localStorage.setItem('users', JSON.stringify(users));
        renderUsers(); // 再描画
    }
}

renderUsers();
</script>
</body>
</html>
