<!DOCTYPE html>
<html lang="ja">
<head>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "ここに貼る",
  authDomain: "ここに貼る",
  projectId: "ここに貼る"
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>
<link rel="stylesheet" href="style.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鍼灸Study - 学習</title>
</head>

<body>

<div class="container">

  <div class="card" style="margin-bottom:100px;">

    <h1 id="title">学習</h1>

    <div id="study"></div>

    <button style="background:#777;" onclick="location.href='studyMenu.html'">
      科目選択へ戻る
    </button>

  </div>

</div>

<!-- 下固定 -->
<div class="fixed-bottom">
  <button onclick="location.href='home.html'">ホーム</button>
</div>

<script>

let subject = localStorage.getItem("selectedSubject");
document.getElementById("title").textContent = subject + " 学習";

// ===== 問題 =====
const studyQuiz = {

"衛生学・公衆衛生学":[
{
question:"市町村保健センターは（　）を行う",
choices:["食品衛生","乳幼児健診","感染症"],
answer:1,
explanation:"市町村保健センターは地域住民の健康管理を担い、乳幼児健診などを行う。"
},
{
question:"保健所は主に（　）を担当する",
choices:["美容","感染症","スポーツ"],
answer:1,
explanation:"保健所は感染症対策や食品衛生など公衆衛生に関する業務を担う。"
}
]

};

let quiz = studyQuiz[subject] || [];
let index = 0;

show();

// ===== 表示 =====
function show(){

if(index >= quiz.length){

let html = `
<h2>学習完了！</h2>

<button onclick="goQuiz()">
この科目のクイズへ
</button>

<button style="background:#777;" onclick="location.href='studyMenu.html'">
他の科目を学習
</button>
`;

document.getElementById("study").innerHTML = html;
return;
}

let q = quiz[index];
let shuffledChoices = shuffle([...q.choices]);
let correctText = q.choices[q.answer];

let html = `<div class='questionBox'>${q.question}</div>`;

shuffledChoices.forEach((c)=>{
html += `<button class='choiceBtn' onclick='answerChoice("${c}")'>${c}</button>`;
});

document.getElementById("study").innerHTML = html;

}

// ===== 回答 =====
function answerChoice(choice){

let q = quiz[index];
let correctText = q.choices[q.answer];

let buttons = document.querySelectorAll(".choiceBtn");

buttons.forEach(b=>b.disabled=true);

let html = "";

if(choice === correctText){

buttons.forEach(btn=>{
if(btn.textContent === choice){
btn.classList.add("correct");
}
});

html += "<h3 style='color:#2196f3'>⭕ 正解！</h3>";

}else{

buttons.forEach(btn=>{
if(btn.textContent === choice){
btn.classList.add("wrong");
}
if(btn.textContent === correctText){
btn.classList.add("correct");
}
});

html += "<h3 style='color:#f44336'>❌ 不正解</h3>";
}

html += `
<div class="point">
<strong>解説</strong><br>
${q.explanation}
</div>

<button onclick="nextQuestion()">次へ</button>
`;

document.getElementById("study").innerHTML += html;

}

// ===== 次へ =====
function nextQuestion(){
index++;
show();
}

// ===== クイズへ =====
function goQuiz(){
localStorage.setItem("selectedSubject", subject);
location.href = "quiz.html";
}

// ===== シャッフル =====
function shuffle(array){
for(let i = array.length - 1; i > 0; i--){
const j = Math.floor(Math.random() * (i + 1));
[array[i], array[j]] = [array[j], array[i]];
}
return array;
}

</script>

</body>
</html>
