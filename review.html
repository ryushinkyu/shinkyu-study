<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="stylesheet" href="style.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>復習リスト</title>
</head>

<body>

<div class="container">

  <div class="card">
    <h2>復習リスト</h2>
    <div id="reviewList"></div>
    <button style="background:#777;" onclick="location.href='home.html'">ホーム</button>
  </div>

</div>

<script>

// 問題データ（quizと同じ）
const allQuiz = {

"衛生学・公衆衛生学":[
{
question:"市町村保健センターの役割はどれか？",
choices:[
"食品衛生に関する業務",
"環境衛生に関する業務",
"エイズに関する相談",
"乳幼児健診"
],
answer:3
},
{
question:"保健所について誤っているのはどれか？",
choices:[
"地域保健法で規定される",
"保健所長は医師である必要がある",
"栄養の改善および食品衛生に関する業務を行う",
"地域保健に係わる統計に関する業務を行う"
],
answer:1
}
]

};

let html = "";

Object.keys(allQuiz).forEach(subject=>{

let wrong = JSON.parse(localStorage.getItem("wrongQuestions_"+subject) || "[]");

if(wrong.length > 0){

html += `<div class="card"><h3>📚 ${subject}</h3></div>`;

wrong.forEach(i=>{
let q = allQuiz[subject][i];

html += `
<div class="card">
<p>
正解：
<span class="mask" onclick="reveal(this)">
${q.choices[q.answer]}
</span>
</p>

</div>
`;
});

}

});

if(html === ""){
html = "<p>復習する問題はありません</p>";
}

document.getElementById("reviewList").innerHTML = html;

function reveal(el){
el.classList.toggle("show");
}
</script>

<style>
.mask{
background:#333;
color:transparent; /* ←これが重要 */
padding:5px 10px;
border-radius:6px;
cursor:pointer;
display:inline-block;
user-select:none;
}

.show{
background:#e3f2fd;
color:#000;
}
</style>
</body>
</html>
