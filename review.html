<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="stylesheet" href="style.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>復習リスト</title>

<style>
.mask{
background:#ffeb3b;
color:transparent;
padding:5px 10px;
border-radius:6px;
cursor:pointer;
display:inline-block;
}

.show{
background:#e3f2fd;
color:#0288d1;
font-weight:bold;
}
</style>

</head>

<body>

<div class="card">

<h2>復習リスト</h2>

<div id="reviewList"></div>

<button onclick="location.href='home.html'">ホーム</button>

</div>

<script>

let html = "";

// ===== 全科目チェック =====
for(let key in localStorage){

if(key.startsWith("wrongQuestions_")){

let subject = key.replace("wrongQuestions_","");
let wrong = JSON.parse(localStorage.getItem(key) || "[]");

if(wrong.length > 0){

html += `<div class="card"><h3>📚 ${subject}</h3>`;

wrong.forEach(w=>{

let q = w.questionData;

if(!q) return;

html += `
<div style="margin-top:10px; padding:10px; background:#f9f9f9; border-radius:8px;">
<p><strong>${q.question}</strong></p>

<p style="color:#0288d1; font-weight:bold;">
あなたの答え：：${q.choices[w.userAnswer]}
</p>

<p>
<strong>正解：</strong>
<span class="mask" onclick="reveal(this)">${q.choices[q.answer]}
</span>
</p>
</div>
`;

});

html += `</div>`;

}
}

}

if(html === ""){
html = "<p>復習する問題はありません</p>";
}

document.getElementById("reviewList").innerHTML = html;

function reveal(el){
el.classList.toggle("show");
}

</script>

</body>
</html>
