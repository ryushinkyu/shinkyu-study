<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鍼灸Study - 入室</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <div class="card">

    <h2>鍼灸Study</h2>
    <p>合言葉を入力してください</p>

    <input type="password" id="pass" placeholder="パスワード">

    <button onclick="check()">入る</button>

  </div>
</div>

<script>

// Enterキー対応（便利）
document.getElementById("pass").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    check();
  }
});

function check(){

const pass = document.getElementById("pass").value.trim();

// 空チェック
if(!pass){
alert("入力してください");
return;
}

// パスワード
if(pass === "sums2026shinkyu"){

localStorage.setItem("gate", "ok");
location.href = "loginOrRegister.html";

}else{
alert("パスワードが違います");
}

}

</script>

</body>
</html>
