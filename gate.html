<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鍼灸Study - 入室</title>

<style>
body{
font-family:Arial;
background:#f0f0f0;

.container{
background:#fff;
padding:20px;
border-radius:12px;
max-width:400px;
margin:auto;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input{
width:90%;
padding:10px;

}

button{
width:90%;
padding:10px;

</head>

<body>

<div class="container">

<h2>鍼灸Study</h2>
<p>合言葉を入力してください</p>

<input type="password" id="pass" placeholder="パスワード">

<button onclick="check()">入る</button>

</div>

<script>

function check(){

const pass = document.getElementById("pass").value;

// 👇 ここ好きなパスワードに変更
if(pass === "sums2026shinkyu"){
localStorage.setItem("gate", "ok");
location.href = "index.html";
}else{
alert("違います");
}

}

</script>
