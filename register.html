<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新規登録</title>
<link rel="stylesheet" href="style.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCP1hLNtyZAsrWg27puxdgOdHz6ZAHt4EM",
  authDomain: "shinkyu-study.firebaseapp.com",
  projectId: "shinkyu-study"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

</head>

<body>

<div class="container">
  <div class="card">

    <h2>新規登録</h2>

    <input type="text" id="username" placeholder="ユーザー名">
    <input type="text" id="fullname" placeholder="名前">
    <input type="password" id="password" placeholder="パスワード">

    <button onclick="register()">登録</button>

    <button style="background:#777;" onclick="location.href='index.html'">
      戻る
    </button>

  </div>
</div>

<script>

function register(){

const username = document.getElementById("username").value.trim();
const fullname = document.getElementById("fullname").value.trim();
const password = document.getElementById("password").value;

if(!username || !fullname || !password){
alert("入力してください");
return;
}

// 🔥 重複チェック
db.collection("users").doc(username).get().then(doc => {

if(doc.exists){
alert("このユーザー名は使われています");
return;
}

// 🔥 保存（ここが重要）
db.collection("users").doc(username).set({
username: username,
fullname: fullname,
password: password,
memberId: Date.now().toString()
})
.then(()=>{
alert("登録完了！");
location.href = "login.html";
})
.catch(err=>{
console.error(err);
alert("登録エラー");
});

});

}

</script>

</body>
</html>
