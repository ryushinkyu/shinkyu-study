<!DOCTYPE html>
<html lang="ja">
<head>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "ここに貼る",
  authDomain: "ここに貼る",
  projectId: "ここに貼る"
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>
<link rel="stylesheet" href="style.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クイズ</title>
</head>

<body>

<div class="card selectable">

<h1>クイズ</h1>

<div id="menu"></div>
<div id="quiz"></div>

</div>

<script>

const allQuiz = {

"衛生学・公衆衛生学":[
{
question:"市町村保健センターの役割はどれか？",
choices:[
"食品衛生に関する業務",
"環境衛生に関する業務",
"エイズに関する相談",
"乳幼児健診"
],
answer:3
},
{
question:"保健所について誤っているのはどれか？",
choices:[
"地域保健法で規定される",
"保健所長は医師である必要がある",
"栄養の改善および食品衛生に関する業務を行う",
"地域保健に係わる統計に関する業務を行う"
],
answer:1
}
]

};

let subject = localStorage.getItem("selectedSubject");

let quiz = [];
let quizIndex = 0;
let score = 0;
let results = [];

showMenu();

function showMenu(){

document.getElementById("quiz").innerHTML = "";

document.getElementById("menu").innerHTML = `
<h3>クイズを選択</h3>
<button onclick="startNormal()">通常クイズ</button>
<button onclick="startReview()">間違えた問題</button>
<button onclick="location.href='quizMenu.html'">科目選択</button>
`;

}

function startNormal(){
quiz = (allQuiz[subject] || []).map((q,i)=>({
...q,
originalIndex: i
}));
startQuiz();
}

function startReview(){

let wrong = JSON.parse(localStorage.getItem("wrongQuestions_"+subject) || "[]");

if(wrong.length === 0){
alert("間違えた問題がありません");
return;
}

quiz = wrong.map(w => ({
...allQuiz[subject][w.index],
originalIndex: w.index
}));

startQuiz();
}

function startQuiz(){
quizIndex = 0;
score = 0;
results = [];
document.getElementById("menu").innerHTML = "";
showQuiz();
}

function showQuiz(){

if(quizIndex >= quiz.length){

let html = "<h2>終了！</h2>";
html += "<p>スコア："+score+" / "+quiz.length+"</p>";

results.forEach((r,i)=>{
html += `<p>問題${i+1}：${r ? "⭕" : "❌"}</p>`;
});

html += `
<button onclick="showMenu()">もう一度</button>
<button onclick="location.href='quizMenu.html'">科目選択</button>
<button onclick="location.href='home.html'">ホーム</button>
`;

document.getElementById("quiz").innerHTML = html;
return;
}

const q = quiz[quizIndex];

let html = "<h2>問題 " + (quizIndex+1) + "</h2>";
html += "<p>" + q.question + "</p>";

q.choices.forEach((c,i)=>{
html += `<button onclick="answer(${i})">${i+1}．${c}</button>`;
});

document.getElementById("quiz").innerHTML = html;

}

function answer(choice){

let q = quiz[quizIndex];
let correct = q.answer;

let wrong = JSON.parse(localStorage.getItem("wrongQuestions_"+subject) || "[]");

let originalIndex = q.originalIndex;

if(choice === correct){
score++;
results.push(true);

wrong = wrong.filter(w => w.index !== originalIndex);

}else{
results.push(false);

let exists = wrong.find(w => w.index === originalIndex);

if(!exists){
wrong.push({
index: originalIndex,
userAnswer: choice,
questionData: q   // ←これ追加
});
}
}

localStorage.setItem("wrongQuestions_"+subject, JSON.stringify(wrong));

quizIndex++;
showQuiz();

}

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</script>

</body>
</html>
