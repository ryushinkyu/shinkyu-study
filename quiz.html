<script>

const allQuiz = {

"дїќеЃҐж‰Ђй•·гЃЇеЊ»её«гЃ§гЃ‚г‚‹еї…и¦ЃгЃЊгЃ‚г‚‹",
"ж „й¤ЉгЃ®ж”№е–„гЃЉг‚€гЃійЈџе“ЃиЎ›з”џгЃ«й–ўгЃ™г‚‹жҐ­е‹™г‚’иЎЊгЃ†",
"ењ°еџџдїќеЃҐгЃ«дї‚г‚Џг‚‹зµ±иЁ€гЃ«й–ўгЃ™г‚‹жҐ­е‹™г‚’иЎЊгЃ†"
],

}
],

"и§Је‰–е­¦":[
{

choices:[
"иЎЂж¶Іг‚’йЂЃг‚‹",
"дЅ“г‚’ж”ЇгЃ€г‚‹",
"ж¶€еЊ–гЃ™г‚‹",
"е‘јеђёгЃ™г‚‹"
],
answer:1
}
]

};

// ===== гЃ“гЃ“гЃ‹г‚‰е‡¦зђ† =====
let subject = localStorage.getItem("selectedSubject");

let quiz = [];
let quizIndex = 0;
let score = 0;
let results = [];

showMenu();

function showMenu(){
document.getElementById("quiz").innerHTML = "";

document.getElementById("menu").innerHTML =
"<button class='menuBtn' onclick='startNormal()'>йЂљеёёг‚Їг‚¤г‚є</button>" +
"<button class='menuBtn' onclick='startReview()'>й–“йЃ•гЃ€гЃџе•ЏйЎЊгЃ гЃ‘</button>" +
"<br><button class='backBtn' onclick=\"location.href='quizMenu.html'\">з§‘з›®йЃёжЉћгЃ«ж€»г‚‹</button>";
}

function startNormal(){
if(!allQuiz[subject]){
alert("е•ЏйЎЊгЃЊгЃ‚г‚ЉгЃѕгЃ›г‚“");
return;
}
quiz = allQuiz[subject];

}

function startReview(){

let wrongIndexes = JSON.parse(localStorage.getItem("wrongQuestions_"+subject) || "[]");

if(wrongIndexes.length === 0){
alert("й–“йЃ•гЃ€гЃџе•ЏйЎЊгЃЊгЃ‚г‚ЉгЃѕгЃ›г‚“");
return;
}

quiz = wrongIndexes.map(i => allQuiz[subject][i]);
startQuiz();
}

function startQuiz(){
quizIndex = 0;
score = 0;
results = [];
document.getElementById("menu").innerHTML = "";
showQuiz();
}

function showQuiz(){

if(quizIndex >= quiz.length){

let html = "<h2>зµ‚дє†пјЃ</h2>";
html += "<p>г‚№г‚іг‚ўпјљ"+score+" / "+quiz.length+"</p>";

results.forEach((r,i)=>{
html += `<p>е•ЏйЎЊ${i+1}пјљ${r ? "в­•" : "вќЊ"}</p>`;
});

html += "<br><button onclick='showMenu()'>г‚‚гЃ†дёЂеє¦</button>";
html += "<br><button onclick=\"location.href='quizMenu.html'\">з§‘з›®йЃёжЉћгЃё</button>";
html += "<br><button onclick=\"location.href='home.html'\">гѓ›гѓјгѓ </button>";

document.getElementById("quiz").innerHTML = html;
return;
}

const q = quiz[quizIndex];

let html = "<h2>е•ЏйЎЊ " + (quizIndex+1) + "</h2>";
html += "<div class='questionBox'>" + q.question + "</div>";

q.choices.forEach((choice,index)=>{
html += "<button class='choiceBtn' onclick='checkAnswer(" + index + ")'>" 
+ (index+1) + "пјЋ" + choice + "</button>";
});

document.getElementById("quiz").innerHTML = html;
}

function checkAnswer(num){

let correct = quiz[quizIndex].answer;
let buttons = document.querySelectorAll(".choiceBtn");

buttons.forEach(btn => btn.disabled = true);

let wrong = JSON.parse(localStorage.getItem("wrongQuestions_"+subject) || "[]");
let originalIndex = allQuiz[subject].indexOf(quiz[quizIndex]);

if(num === correct){
buttons[num].classList.add("correct");
score++;
results.push(true);
wrong = wrong.filter(i => i !== originalIndex);
}else{
buttons[num].classList.add("wrong");
buttons[correct].classList.add("correct");
results.push(false);
if(!wrong.includes(originalIndex)) wrong.push(originalIndex);
}

localStorage.setItem("wrongQuestions_"+subject, JSON.stringify(wrong));

setTimeout(()=>{
quizIndex++;
showQuiz();
},1000);

}

</script>
