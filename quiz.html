<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="stylesheet" href="style.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鍼灸Study - クイズ</title>
</head>

<body>

<div class="container">

  <div class="card">
    <h1>クイズ</h1>
  </div>

  <div id="menu"></div>
  <div id="quiz"></div>

</div>

<script>

// ===== 問題 =====
const allQuiz = {

"衛生学・公衆衛生学":[
{
question:"市町村保健センターの役割はどれか？",
choices:[
"食品衛生に関する業務",
"環境衛生に関する業務",
"エイズに関する相談",
"乳幼児健診"
],
answer:3
},
{
question:"保健所について誤っているのはどれか？",
choices:[
"地域保健法で規定される",
"保健所長は医師である必要がある",
"栄養の改善および食品衛生に関する業務を行う",
"地域保健に係わる統計に関する業務を行う"
],
answer:1
}
],

"解剖学":[
{
question:"骨の役割はどれか？",
choices:[
"血液を送る",
"体を支える",
"消化する",
"呼吸する"
],
answer:1
}
]

};

let subject = localStorage.getItem("selectedSubject");

let quiz = [];
let quizIndex = 0;
let score = 0;
let results = [];

showMenu();

// ===== メニュー =====
function showMenu(){

document.getElementById("quiz").innerHTML = "";

document.getElementById("menu").innerHTML = `
<div class="card">
<h3>クイズを選択</h3>

<button onclick="startNormal()">通常クイズ</button>
<button onclick="startReview()">間違えた問題</button>

<button style="background:#777;" onclick="location.href='quizMenu.html'">科目選択に戻る</button>
</div>
`;

}

// ===== 通常 =====
function startNormal(){
if(!allQuiz[subject]){
alert("問題がありません");
return;
}
quiz = allQuiz[subject];
startQuiz();
}

// ===== 復習 =====
function startReview(){

let wrongIndexes = JSON.parse(localStorage.getItem("wrongQuestions_"+subject) || "[]");

if(wrongIndexes.length === 0){
alert("間違えた問題がありません");
return;
}

quiz = wrongIndexes.map(i => allQuiz[subject][i]);
startQuiz();
}

// ===== 開始 =====
function startQuiz(){
quizIndex = 0;
score = 0;
results = [];
document.getElementById("menu").innerHTML = "";
showQuiz();
}

// ===== 表示 =====
function showQuiz(){

// 終了
if(quizIndex >= quiz.length){

let html = `
<div class="card">
<h2>終了！</h2>
<p>スコア：${score} / ${quiz.length}</p>
`;

results.forEach((r,i)=>{
html += `<p>問題${i+1}：${r ? "⭕" : "❌"}</p>`;
});

html += `
<button onclick="showMenu()">もう一度</button>
<button style="background:#777;" onclick="location.href='quizMenu.html'">科目選択へ</button>
<button style="background:#777;" onclick="location.href='home.html'">ホーム</button>
</div>
`;

document.getElementById("quiz").innerHTML = html;
return;
}

// 問題
const q = quiz[quizIndex];

let html = `
<div class="card">
<h2>問題 ${quizIndex+1}</h2>
<p>${q.question}</p>
`;

q.choices.forEach((choice,index)=>{
html += `<button class="choiceBtn" onclick="checkAnswer(${index})">${index+1}．${choice}</button>`;
});

html += `</div>`;

document.getElementById("quiz").innerHTML = html;

}

// ===== 判定 =====
function checkAnswer(num){

let correct = quiz[quizIndex].answer;
let buttons = document.querySelectorAll(".choiceBtn");

buttons.forEach(btn => btn.disabled = true);

let wrong = JSON.parse(localStorage.getItem("wrongQuestions_"+subject) || "[]");
let originalIndex = allQuiz[subject].indexOf(quiz[quizIndex]);

if(num === correct){
buttons[num].classList.add("correct");
score++;
results.push(true);
wrong = wrong.filter(i => i !== originalIndex);
}else{
buttons[num].classList.add("wrong");
buttons[correct].classList.add("correct");
results.push(false);
if(!wrong.includes(originalIndex)) wrong.push(originalIndex);
}

localStorage.setItem("wrongQuestions_"+subject, JSON.stringify(wrong));

setTimeout(()=>{
quizIndex++;
showQuiz();
},1000);

}

</script>

</body>
</html>
