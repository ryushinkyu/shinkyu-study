<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鍼灸Study - クイズ</title>

<style>
body {
font-family: Arial;
background:#f0f0f0;
padding:20px;
margin:0;
}

.container {
background:#fff;
padding:20px;
border-radius:12px;
max-width:500px;
margin:auto;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

h1 {
margin-bottom:20px;
}

.questionBox {
background:#f9f9f9;
padding:15px;
border-radius:10px;
margin-bottom:15px;
font-size:16px;
}

.choiceBtn {
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:8px;
background:#0288d1;
color:white;
font-size:16px;
cursor:pointer;
}

.correct {
background:#2196f3 !important;
}

.wrong {
background:#f44336 !important;
}

.menuBtn {
background:#4caf50;
}

.backBtn {
background:#777;
}
</style>

</head>

<body>

<div class="container">

<h1>クイズ</h1>

<div id="menu"></div>
<div id="quiz"></div>

</div>

<script src="questions.js"></script>

<script>

let subject = localStorage.getItem("selectedSubject");
let allQuiz = window.allQuiz || {};

let quiz = [];
let quizIndex = 0;
let score = 0;
let results = [];

showMenu();

function showMenu(){
document.getElementById("quiz").innerHTML = "";
document.getElementById("menu").innerHTML =
"<button class='menuBtn' onclick='startNormal()'>通常クイズ</button>" +
"<button class='menuBtn' onclick='startReview()'>間違えた問題だけ</button>" +
"<br><button class='backBtn' onclick=\"location.href='quizMenu.html'\">科目選択に戻る</button>";
}

function startNormal(){
quiz = allQuiz[subject] || [];
startQuiz();
}

function startReview(){

let wrongIndexes = JSON.parse(localStorage.getItem("wrongQuestions_"+subject) || "[]");

if(wrongIndexes.length === 0){
alert("間違えた問題がありません");
return;
}

quiz = wrongIndexes.map(i => allQuiz[subject][i]);
startQuiz();
}

function startQuiz(){
quizIndex = 0;
score = 0;
results = [];
document.getElementById("menu").innerHTML = "";
showQuiz();
}

function showQuiz(){

if(quizIndex >= quiz.length){

let currentUser = localStorage.getItem("currentUser");
let history = JSON.parse(localStorage.getItem("quizHistory") || "{}");

if(!history[currentUser]) history[currentUser] = [];

history[currentUser].push({
date: new Date().toLocaleString(),
score: score,
total: quiz.length,
subject: subject,
detail: results
});

localStorage.setItem("quizHistory", JSON.stringify(history));

let html = "<h2>終了！</h2>";
html += "<p>スコア："+score+" / "+quiz.length+"</p>";

results.forEach((r,i)=>{
html += `<p>問題${i+1}：${r ? "⭕" : "❌"}</p>`;
});

html += "<br><button onclick='showMenu()'>もう一度</button>";
html += "<br><button onclick=\"location.href='quizMenu.html'\">科目選択へ</button>";
html += "<br><button onclick=\"location.href='home.html'\">ホーム</button>";

document.getElementById("quiz").innerHTML = html;
return;
}

const q = quiz[quizIndex];

let html = "<h2 style='color:#0288d1'>問題 " + (quizIndex+1) + "</h2>";

html += "<div class='questionBox'>" + q.question + "</div>";

q.choices.forEach((choice,index)=>{
html += "<button class='choiceBtn' onclick='checkAnswer(" + index + ")'>" 
+ (index+1) + "．" + choice + "</button>";
});

document.getElementById("quiz").innerHTML = html;
}

function checkAnswer(num){

let correct = quiz[quizIndex].answer;
let buttons = document.querySelectorAll(".choiceBtn");

buttons.forEach(btn => btn.disabled = true);

let originalIndex = allQuiz[subject].indexOf(quiz[quizIndex]);
let wrong = JSON.parse(localStorage.getItem("wrongQuestions_"+subject) || "[]");

if(num === correct){

buttons[num].classList.add("correct");
score++;
results.push(true);
wrong = wrong.filter(i => i !== originalIndex);

}else{

buttons[num].classList.add("wrong");
buttons[correct].classList.add("correct");
results.push(false);

if(!wrong.includes(originalIndex)){
wrong.push(originalIndex);
}

}

localStorage.setItem("wrongQuestions_"+subject, JSON.stringify(wrong));

setTimeout(()=>{
quizIndex++;
showQuiz();
}, 1000);

}

</script>

</body>
</html>
