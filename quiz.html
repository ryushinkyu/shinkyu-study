<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鍼灸Study - クイズ</title>

<style>
body {
font-family: Arial;
background:#f0f0f0;
padding:20px;
margin:0;
}

.container {
background:#fff;
padding:20px;
border-radius:12px;
max-width:500px;
margin:auto;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

.questionBox {
background:#f9f9f9;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

.mainBtn {
width:100%;
padding:14px;
margin:10px 0;
font-size:16px;
border:none;
border-radius:10px;
background:#0288d1;
color:white;
cursor:pointer;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.mainBtn:hover {
opacity:0.9;
}

.green { background:#4caf50; }
.gray { background:#777; }
.choiceBtn {
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:8px;
background:#0288d1;
color:white;
}

.correct { background:#2196f3 !important; }
.wrong { background:#f44336 !important; }

.menuBtn { background:#4caf50; }
.backBtn { background:#777; }
</style>

</head>

<body>

<div class="container">

<h1>クイズ</h1>

<div id="menu"></div>
<div id="quiz"></div>

</div>

<script>

// ===== 問題（ここに直接書く） =====
const allQuiz = {

"衛生学・公衆衛生学":[
{
question:"市町村保健センターの役割はどれか？",
choices:[
"食品衛生に関する業務",
"環境衛生に関する業務",
"エイズに関する相談",
"乳幼児健診"
],
answer:3
},
{
question:"保健所について誤っているのはどれか？",
choices:[
"地域保健法で規定される",
"保健所長は医師である必要がある",
"栄養の改善および食品衛生に関する業務を行う",
"地域保健に係わる統計に関する業務を行う"
],
answer:1
}
],

"解剖学":[
{
question:"骨の役割はどれか？",
choices:[
"血液を送る",
"体を支える",
"消化する",
"呼吸する"
],
answer:1
}
]

};

// ===== ここから処理 =====
let subject = localStorage.getItem("selectedSubject");

let quiz = [];
let quizIndex = 0;
let score = 0;
let results = [];

showMenu();

function showMenu(){

document.getElementById("quiz").innerHTML = "";

document.getElementById("menu").innerHTML = `
<div class="questionBox">
<h3>クイズを選択</h3>
<button class="mainBtn green" onclick="startNormal()">通常クイズ</button>
<button class="mainBtn green" onclick="startReview()">間違えた問題</button>
</div>

<button class="mainBtn gray" onclick="location.href='quizMenu.html'">科目選択に戻る</button>
`;

}
function startNormal(){
if(!allQuiz[subject]){
alert("問題がありません");
return;
}
quiz = allQuiz[subject];
startQuiz();
}

function startReview(){

let wrongIndexes = JSON.parse(localStorage.getItem("wrongQuestions_"+subject) || "[]");

if(wrongIndexes.length === 0){
alert("間違えた問題がありません");
return;
}

quiz = wrongIndexes.map(i => allQuiz[subject][i]);
startQuiz();
}

function startQuiz(){
quizIndex = 0;
score = 0;
results = [];
document.getElementById("menu").innerHTML = "";
showQuiz();
}

function showQuiz(){

let html = "<h2>終了！</h2>";
html += "<p>スコア："+score+" / "+quiz.length+"</p>";

results.forEach((r,i)=>{
html += `<p>問題${i+1}：${r ? "⭕" : "❌"}</p>`;
});

html += `
<br>
<button class="mainBtn green" onclick="showMenu()">もう一度</button>
<button class="mainBtn gray" onclick="location.href='quizMenu.html'">科目選択へ</button>
<button class="mainBtn gray" onclick="location.href='home.html'">ホーム</button>
`;

document.getElementById("quiz").innerHTML = html;
const q = quiz[quizIndex];

let html = "<h2>問題 " + (quizIndex+1) + "</h2>";
html += "<div class='questionBox'>" + q.question + "</div>";

q.choices.forEach((choice,index)=>{
html += "<button class='choiceBtn' onclick='checkAnswer(" + index + ")'>" 
+ (index+1) + "．" + choice + "</button>";
});

document.getElementById("quiz").innerHTML = html;
}

function checkAnswer(num){

let correct = quiz[quizIndex].answer;
let buttons = document.querySelectorAll(".choiceBtn");

buttons.forEach(btn => btn.disabled = true);

let wrong = JSON.parse(localStorage.getItem("wrongQuestions_"+subject) || "[]");
let originalIndex = allQuiz[subject].indexOf(quiz[quizIndex]);

if(num === correct){
buttons[num].classList.add("correct");
score++;
results.push(true);
wrong = wrong.filter(i => i !== originalIndex);
}else{
buttons[num].classList.add("wrong");
buttons[correct].classList.add("correct");
results.push(false);
if(!wrong.includes(originalIndex)) wrong.push(originalIndex);
}

localStorage.setItem("wrongQuestions_"+subject, JSON.stringify(wrong));

setTimeout(()=>{
quizIndex++;
showQuiz();
},1000);

}

</script>

</body>
</html>
