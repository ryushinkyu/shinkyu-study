<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鍼灸Study - ホーム</title>
<link rel="stylesheet" href="style.css">

<!-- Firebase（compat版） -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCP1hLNtyZAsrWg27puxdgOdHz6ZAHt4EM",
  authDomain: "shinkyu-study.firebaseapp.com",
  projectId: "shinkyu-study"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

</head>

<body>

<div class="container">

  <div class="card">

    <h2>ホーム画面</h2>
    <p id="welcomeMsg">読み込み中...</p>

    <button onclick="location.href='mypage.html'">マイページ</button>
    <button onclick="location.href='lectureMenu.html'">講義</button>
    <button onclick="location.href='studyMenu.html'">学習</button>
    <button onclick="location.href='quizMenu.html'">クイズ</button>
    <button onclick="location.href='review.html'">復習リスト</button>

    <button id="adminBtn" style="display:none;" onclick="location.href='admin.html'">管理</button>

    <button onclick="logout()">ログアウト</button>

  </div>

</div>

<script>

// ===== ログインチェック =====
const currentUser = localStorage.getItem('currentUser');

if(!currentUser){
location.href = 'loginOrRegister.html';
}

// ===== ユーザー情報取得（Firebase） =====
db.collection("users").doc(currentUser).get()
.then(doc => {

if(doc.exists){

const user = doc.data();

document.getElementById('welcomeMsg').textContent =
`ようこそ、${user.fullname} さん！`;

// 管理者表示
if(currentUser === "admin"){
document.getElementById('adminBtn').style.display = "block";
}

}else{
alert("ユーザー情報がありません");
location.href = 'loginOrRegister.html';
}

});

// ===== ログアウト =====
function logout(){
localStorage.removeItem('currentUser');
location.href = 'loginOrRegister.html';
}

</script>

</body>
</html>
