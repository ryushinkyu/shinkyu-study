<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ホーム</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

  <div class="card">

    <h2>ホーム画面</h2>
    <p id="welcomeMsg"></p>

    <button onclick="location.href='mypage.html'">マイページ</button>
    <button onclick="location.href='lectureMenu.html'">講義</button>
    <button onclick="location.href='studyMenu.html'">学習</button>
    <button onclick="location.href='quizMenu.html'">クイズ</button>
    <button onclick="location.href='review.html'">復習リスト</button>

    <!-- 🔥 ランキング -->
    <button id="rankBtn" style="display:none;" onclick="location.href='ranking.html'">
      ランキング
    </button>

    <!-- 管理 -->
    <button id="adminBtn" style="display:none;" onclick="location.href='admin.html'">
      管理
    </button>

    <button onclick="logout()">ログアウト</button>

  </div>

</div>

<script>

const currentUser = localStorage.getItem("currentUser");

// ===== 日付リセット =====
let today = new Date().toDateString();
let last = localStorage.getItem("lastDate");

if(today !== last){
localStorage.setItem("dailyCleared", "false");
localStorage.setItem("lastDate", today);
}

// ===== 表示 =====
document.getElementById("welcomeMsg").textContent =
  "ようこそ、" + currentUser + " さん！";

// 管理者
if(currentUser === "admin"){
document.getElementById("adminBtn").style.display = "block";
document.getElementById("rankBtn").style.display = "block";
}

// 一般ユーザー
if(localStorage.getItem("dailyCleared") === "true"){
document.getElementById("rankBtn").style.display = "block";
}

// ===== ログアウト =====
function logout(){
localStorage.removeItem("currentUser");
location.href = "loginOrRegister.html";
}

</script>

</body>
</html>
