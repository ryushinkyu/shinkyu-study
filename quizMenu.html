<body>

<div class="container">

  <div class="card">

    <h2>科目を選択</h2>

    <div id="subjectList"></div>

    <button style="background:#777;" onclick="location.href='home.html'">戻る</button>

  </div>

</div>

<script>

// 科目リスト
const subjects = [
"医療概論",
"衛生学・公衆衛生学",
"関係法規",
"解剖学",
"生理学",
"病理学概論",
"臨床医学総論",
"臨床医学各論",
"リハビリテーション医学",
"東洋医学概論",
"経絡経穴概論",
"東洋医学臨床論"
];

// ボタン生成
let html = "";

subjects.forEach(sub=>{
html += `<button onclick="selectSubject('${sub}')">${sub}</button>`;
});

document.getElementById("subjectList").innerHTML = html;

// 選択
function selectSubject(subject){
localStorage.setItem("selectedSubject", subject);
location.href = "quiz.html";
}

</script>

</body>
